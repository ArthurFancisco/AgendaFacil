<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Agendamento enviado · AgendaFácil Pro</title>
  <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="public">
<main class="shell narrow">
  <nav class="booking-stepper" aria-label="Etapas do agendamento">
    <div class="stepper-mobile-summary">
      <div>
        <span th:text="|Etapa ${currentStep} de 6|">Etapa 6 de 6</span>
        <strong th:text="${currentStepLabel}">Confirmação</strong>
      </div>
      <span class="stepper-progress"><span th:style="|width: ${flowProgress}%|"></span></span>
    </div>
    <ol>
      <li th:each="step : ${flowSteps}" th:classappend="${step.number < currentStep ? ' done' : (step.number == currentStep ? ' active' : '')}">
        <span th:text="${step.number}">1</span><b th:text="${step.label}">Serviço</b>
      </li>
    </ol>
  </nav>

  <section class="card center">
    <div class="done">✓</div>
    <span class="eyebrow" th:text="${summary.status}">Pendente</span>
    <h1 th:text="${summary.statusMessage}">Seu pedido foi recebido.</h1>
    <p class="muted" th:text="${summary.nextStep}">O estabelecimento vai revisar seu pedido.</p>

    <div class="booking-summary inline left">
      <dl>
        <dt>Estabelecimento</dt><dd th:text="${summary.establishment}">Estabelecimento</dd>
        <dt>Serviço</dt><dd th:text="${summary.service}">Serviço</dd>
        <dt>Profissional</dt><dd th:text="${summary.professional}">Profissional</dd>
        <dt>Data</dt><dd th:text="${#temporals.format(summary.start,'dd/MM/yyyy')}">24/06/2026</dd>
        <dt>Horário</dt><dd><span th:text="${#temporals.format(summary.start,'HH:mm')}">09:00</span> até <span th:text="${#temporals.format(summary.end,'HH:mm')}">10:00</span></dd>
        <dt>Cliente</dt><dd th:text="${summary.customer}">Cliente</dd>
      </dl>
    </div>

    <p class="success-actions">
      <a class="btn primary" th:href="${summary.whatsappUrl}" target="_blank" rel="noopener">Chamar no WhatsApp</a>
      <a class="btn light" th:href="@{/agenda/{slug}(slug=${summary.establishmentSlug})}">Voltar para a página</a>
    </p>
  </section>
</main>
</body>
</html>
