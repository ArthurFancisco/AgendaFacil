<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<body>
<aside class="admin-sidebar" th:fragment="sidebar(activePage)">
  <div class="brand-box">
    <div class="brand-icon">A</div>
    <div>
      <strong>AgendaFácil</strong>
      <span>Painel do estabelecimento</span>
    </div>
  </div>

  <nav class="side-nav" aria-label="Menu do painel">
    <a th:href="@{/panel}" th:classappend="${activePage == 'dashboard' ? ' active' : ''}">Dashboard</a>
    <a th:href="@{/panel/agenda}" th:classappend="${activePage == 'agenda' ? ' active' : ''}">Agenda</a>
    <a th:href="@{/panel/appointments}" th:classappend="${activePage == 'appointments' ? ' active' : ''}">Agendamentos</a>
    <a th:href="@{/panel/customers}" th:classappend="${activePage == 'customers' ? ' active' : ''}">Clientes</a>
    <a th:href="@{/panel/services}" th:classappend="${activePage == 'services' ? ' active' : ''}">Serviços</a>
    <a th:href="@{/panel/professionals}" th:classappend="${activePage == 'professionals' ? ' active' : ''}">Profissionais</a>
    <a th:href="@{/panel/time-blocks}" th:classappend="${activePage == 'blocks' ? ' active' : ''}">Bloqueios</a>
    <a th:href="@{/panel/settings}" th:classappend="${activePage == 'settings' ? ' active' : ''}">Configurações</a>
    <a th:href="@{/panel/reports}" th:classappend="${activePage == 'reports' ? ' active' : ''}">Relatórios</a>
  </nav>

  <div class="side-footer">
    <a class="btn secondary full" th:href="@{/agenda/{slug}(slug=${establishment.slug})}">
      Ver agenda pública
    </a>

    <form th:action="@{/logout}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
      <button class="btn danger-outline full" type="submit">Sair</button>
    </form>
  </div>
</aside>

<div th:fragment="flash">
  <div class="alert success" th:if="${success}" th:text="${success}">
    Alteração realizada com sucesso.
  </div>

  <div class="alert danger" th:if="${error}" th:text="${error}">
    Não foi possível concluir essa ação.
  </div>
</div>
</body>
</html>
