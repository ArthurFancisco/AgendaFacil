<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clientes · AgendaFácil Pro</title>
  <link rel="stylesheet" th:href="@{/css/app.css}">
  <script defer th:src="@{/js/app.js}"></script>
</head>

<body class="admin-page">
  <aside th:replace="~{panel/fragments :: sidebar(${activePage})}"></aside>

  <main class="admin-main">
    <header class="admin-header page-header">
      <div>
        <span class="eyebrow">Relacionamento</span>
        <h1 class="page-title" th:text="${pageTitle}">Clientes</h1>
        <p class="page-subtitle" th:text="${pageSubtitle}">Consulte clientes por nome ou telefone.</p>
      </div>
    </header>

    <div th:replace="~{panel/fragments :: flash}"></div>

    <section class="admin-card">
      <div class="section-title">
        <div>
          <span class="eyebrow">Busca</span>
          <h2>Base de clientes</h2>
        </div>
        <form class="inline-search" th:action="@{/panel/customers}" method="get">
          <input name="q" th:value="${customerQuery}" placeholder="Nome ou telefone" autocomplete="off">
          <button class="btn secondary" type="submit">Buscar</button>
        </form>
      </div>

      <div class="table-wrap" th:if="${not #lists.isEmpty(customers)}">
        <table class="admin-table data-table">
          <thead>
          <tr>
            <th>Cliente</th>
            <th>Telefone</th>
            <th>Faltas</th>
            <th>Status</th>
            <th>Atualizado em</th>
          </tr>
          </thead>
          <tbody>
          <tr th:each="c : ${customers}">
            <td><strong th:text="${c.name}">Cliente</strong></td>
            <td th:text="${@view.phone(c.phoneNormalized)}">(17) 99999-9999</td>
            <td th:text="${c.noShowCount}">0</td>
            <td>
              <span th:class="${c.blocked ? 'badge noshow' : (c.noShowCount >= 2 ? 'badge pending' : 'badge completed')}"
                    th:text="${c.blocked ? 'Bloqueado' : (c.noShowCount >= 2 ? 'Revisar' : 'Ativo')}">Ativo</span>
            </td>
            <td th:text="${#temporals.format(c.updatedAt, 'dd/MM/yyyy HH:mm')}">24/06/2026 10:00</td>
          </tr>
          </tbody>
        </table>
      </div>

      <div class="empty-state" th:if="${#lists.isEmpty(customers)}">
        Nenhum cliente encontrado.
      </div>
    </section>
  </main>
</body>
</html>
