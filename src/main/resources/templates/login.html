<!DOCTYPE html><html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Entrar · AgendaFácil Pro</title><link rel="stylesheet" th:href="@{/css/app.css}"></head>
<body class="auth">
  <main class="auth-card">
    <div class="mark">A</div><h1>Entrar no painel</h1><p class="muted">A agenda do estabelecimento fica protegida por login.</p>
    <div class="alert danger" th:if="${param.error}">E-mail ou senha não conferem.</div>
    <div class="alert ok" th:if="${param.logout}">Você saiu do painel com segurança.</div>
    <form th:action="@{/login}" method="post" class="form">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
      <label>E-mail<input name="email" type="email" placeholder="admin@demo.local" required autofocus></label>
      <label>Senha<input name="password" type="password" placeholder="Sua senha" required></label>
      <button class="btn primary" type="submit">Entrar</button>
    </form>
    <small class="muted">Demo local: admin@demo.local · admin123</small>
  </main>
</body></html>
