spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/agendafacil_pro}
    username: ${DB_USERNAME:agendafacil}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  thymeleaf:
    cache: false
server:
  servlet:
    session:
      timeout: 30m
      cookie:
        name: AGENDAFACIL_SESSION
        http-only: true
        secure: false
        same-site: strict
  error:
    whitelabel:
      enabled: false
    include-message: never
    include-stacktrace: never
    include-binding-errors: never
---
spring:
  config:
    activate:
      on-profile: prod
server:
  servlet:
    session:
      cookie:
        secure: true
