spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/agendafacil_pro}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postdba}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  thymeleaf:
    cache: false
server:
  error:
    whitelabel:
      enabled: false
    include-message: never
    include-stacktrace: never
